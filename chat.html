<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekio Salud</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23888fc7'/><text x='50' y='68' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' text-anchor='middle' fill='white'>T</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --azul: #888fc7;
    --azul-dark: #6d74b0;
    --azul-light: #eeeef8;
    --texto: #1a1a2e;
    --gris: #6b7280;
    --borde: #e5e7eb;
    --dark-btn: #1a2e44;
    --verde: #2a9d73;
  }

  html, body {
    height: 100%; font-family: 'Inter', -apple-system, sans-serif;
    color: var(--texto); background: #f0f4f8; overflow: hidden;
  }
  .page-wrap { display: flex; flex-direction: column; height: 100vh; }

  /* ── NAV ── */
  nav {
    background: var(--azul);
    display: flex; align-items: center;
    padding: 0 32px; height: 68px;
    flex-shrink: 0; z-index: 10;
    gap: 0;
  }
  .nav-logo {
    font-family: 'Nunito', sans-serif; font-size: 30px; font-weight: 900;
    color: #fff; letter-spacing: -1px; text-decoration: none; flex-shrink: 0;
    margin-right: 40px;
  }
  /* TABS centradas */
  .nav-tabs {
    display: flex; align-items: stretch; gap: 4px; height: 100%; flex: 1;
  }
  .nav-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 0 20px; font-size: 14px; font-weight: 600;
    color: rgba(255,255,255,.75); text-decoration: none;
    border-bottom: 3px solid transparent;
    transition: color .2s, border-color .2s;
    white-space: nowrap; cursor: pointer; background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .nav-tab:hover { color: #fff; }
  .nav-tab.active { color: #fff; border-bottom-color: #fff; }
  .nav-tab svg { opacity: .8; }
  .nav-tab.active svg { opacity: 1; }
  /* AVATAR derecha */
  .nav-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--verde); color: #fff;
    font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-left: auto;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1; display: flex; flex-direction: column;
    max-width: 800px; width: 100%; margin: 0 auto;
    overflow: hidden; padding: 0 16px;
  }
  .chat-title-bar { padding: 22px 0 14px; flex-shrink: 0; }
  .chat-title-bar h1 {
    font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 900;
    color: var(--azul); margin-bottom: 3px;
  }
  .chat-title-bar p { font-size: 14px; color: var(--gris); }

  /* ── WIDGET ── */
  .chat-widget {
    flex: 1; border-radius: 20px; overflow: hidden; border: 1px solid var(--borde);
    box-shadow: 0 12px 48px rgba(136,143,199,.15);
    display: flex; flex-direction: column; background: #f0f4f8; margin-bottom: 16px;
  }
  .cw-header {
    background: var(--azul); padding: 14px 20px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .cw-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; color: #fff; flex-shrink: 0;
  }
  .cw-name { font-size: 14px; font-weight: 600; color: #fff; }
  .cw-status { font-size: 12px; color: rgba(255,255,255,.8); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .cw-dot { width: 7px; height: 7px; border-radius: 50%; background: #a8f0d4; }
  .cw-messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth;
  }
  .cw-messages::-webkit-scrollbar { width: 4px; }
  .cw-messages::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
  .cw-loading { display: flex; align-items: center; gap: 10px; color: var(--gris); font-size: 14px; padding: 20px 0; }
  .cw-spinner {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--borde); border-top-color: var(--azul);
    animation: cwSpin .8s linear infinite;
  }
  @keyframes cwSpin { to { transform: rotate(360deg); } }
  .cw-msg { display: flex; flex-direction: column; max-width: 78%; gap: 4px; }
  .cw-msg.bot { align-self: flex-start; }
  .cw-msg.user { align-self: flex-end; }
  .cw-msg-label { font-size: 11px; color: #a0aec0; }
  .cw-msg.user .cw-msg-label { text-align: right; }
  .cw-bubble { padding: 11px 15px; border-radius: 16px; font-size: 14px; line-height: 1.55; word-break: break-word; }
  .cw-msg.bot .cw-bubble { background: #fff; color: var(--texto); border-top-left-radius: 4px; border: 1px solid var(--borde); }
  .cw-msg.user .cw-bubble { background: var(--azul); color: #fff; border-top-right-radius: 4px; }
  .cw-typing-wrap { display: flex; align-items: center; gap: 5px; padding: 12px 15px; }
  .cw-typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #a0aec0; animation: cwBounce .9s infinite; }
  .cw-typing-dot:nth-child(2) { animation-delay: .15s; }
  .cw-typing-dot:nth-child(3) { animation-delay: .30s; }
  @keyframes cwBounce { 0%,80%,100%{ transform:translateY(0); } 40%{ transform:translateY(-6px); } }
  .cw-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px 10px; background: #fff; border-top: 1px solid var(--borde); }
  .cw-chip {
    padding: 7px 13px; border-radius: 50px; font-size: 13px;
    border: 1.5px solid var(--borde); background: #fff;
    cursor: pointer; color: var(--azul); font-weight: 600;
    transition: all .15s; font-family: inherit;
  }
  .cw-chip:hover { background: var(--azul); color: #fff; border-color: var(--azul); }
  .cw-powered { padding: 5px 16px; background: #fff; font-size: 11px; color: #a0aec0; border-top: 1px solid var(--borde); }
  .cw-input-row { padding: 12px 16px; background: #fff; border-top: 1px solid var(--borde); display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .cw-input {
    flex: 1; padding: 10px 14px; border: 1.5px solid var(--borde); border-radius: 50px;
    font-size: 14px; outline: none; font-family: inherit; color: var(--texto); transition: border .15s;
  }
  .cw-input:focus { border-color: var(--azul); }
  .cw-send {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--azul); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .1s; flex-shrink: 0;
  }
  .cw-send:hover { background: var(--azul-dark); }
  .cw-send:active { transform: scale(.93); }
  .cw-send:disabled { opacity: .5; cursor: not-allowed; }
  .cw-bubble strong { font-weight: 700; }

  @media (max-width: 768px) {
    nav { padding: 0 16px; height: 58px; }
    .nav-logo { font-size: 24px; margin-right: 20px; }
    .nav-tab { padding: 0 12px; font-size: 13px; }
    .chat-title-bar { padding: 14px 0 10px; }
    .chat-title-bar h1 { font-size: 20px; }
    .cw-msg { max-width: 88%; }
  }
</style>
</head>
<body>

<div class="page-wrap">

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">tekio</a>

    <div class="nav-tabs">
      <a class="nav-tab active" href="chat.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Prueba el chat
      </a>
      <a class="nav-tab" href="dashboard.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
    </div>

    <div class="nav-avatar" id="navAvatar">T</div>
  </nav>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-title-bar">
      <h1>Probemos el chat</h1>
      <p>Con base en la información que añadiste, prueba y califica la respuesta del chatbot.</p>
    </div>

    <div class="chat-widget">
      <div class="cw-header">
        <div class="cw-avatar">T</div>
        <div>
          <div class="cw-name" id="cwName">Asistente Tekio</div>
          <div class="cw-status">
            <span class="cw-dot"></span>
            En línea · Impulsado por Claude
          </div>
        </div>
      </div>
      <div class="cw-messages" id="cwMessages">
        <div class="cw-loading" id="cwLoading">
          <div class="cw-spinner"></div>
          <span>Cargando datos del consultorio...</span>
        </div>
      </div>
      <div class="cw-chips" id="cwChips">
        <button class="cw-chip" onclick="sendChip(this)">¿Cómo se llama el doctor?</button>
        <button class="cw-chip" onclick="sendChip(this)">¿Dónde está el consultorio?</button>
        <button class="cw-chip" onclick="sendChip(this)">¿Cuál es su especialidad?</button>
        <button class="cw-chip" onclick="sendChip(this)">Quiero agendar una cita</button>
      </div>
      <div class="cw-powered">⚡ Impulsado por Claude AI</div>
      <div class="cw-input-row">
        <input class="cw-input" id="cwInput" type="text"
          placeholder="Escribe un mensaje..."
          onkeydown="if(event.key==='Enter')cwSend()" />
        <button class="cw-send" id="cwSendBtn" onclick="cwSend()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  const RAILWAY_URL = 'https://web-production-c4962.up.railway.app';
  let cwHistory = [];
  let cwChipsVisible = true;

  function renderMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  async function cwInit() {
    try {
      const r = await fetch(`${RAILWAY_URL}/doctor-data`);
      const data = await r.json();
      // Actualizar avatar nav con inicial del nombre
      if (data.nombres) {
        document.getElementById('navAvatar').textContent = data.nombres.charAt(0).toUpperCase();
      }
      const trato = data.trato && data.trato !== 'nombre' ? data.trato + ' ' : '';
      const nombre = `${trato}${data.nombres} ${data.apellidos}`;
      const preposicion = data.trato === 'Dra.' ? 'de la' : 'del';
      document.getElementById('cwName').textContent = data.trato === 'nombre'
        ? `Asistente de ${nombre}`
        : `Asistente ${preposicion} ${nombre}`;
      document.getElementById('cwLoading').remove();
      const bienvenida = `¡Hola! 👋 Soy Tekio, el asistente ${preposicion} ${nombre}. ¿Con qué te puedo ayudar hoy?`;
      cwAppendMsg('bot', bienvenida, 'Asistente Tekio');
      cwHistory.push({ role: 'assistant', content: bienvenida });
    } catch(e) {
      document.getElementById('cwLoading').innerHTML = '⚠️ No se pudo cargar la información del consultorio.';
    }
  }

  function cwAppendMsg(role, text, label) {
    const wrap = document.getElementById('cwMessages');
    const el = document.createElement('div');
    el.className = `cw-msg ${role}`;
    el.innerHTML = `<div class="cw-msg-label">${label}</div><div class="cw-bubble">${renderMarkdown(text)}</div>`;
    wrap.appendChild(el);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function cwShowTyping() {
    const wrap = document.getElementById('cwMessages');
    const el = document.createElement('div');
    el.className = 'cw-msg bot'; el.id = 'cwTyping';
    el.innerHTML = `<div class="cw-msg-label">Asistente Tekio</div><div class="cw-bubble"><div class="cw-typing-wrap"><div class="cw-typing-dot"></div><div class="cw-typing-dot"></div><div class="cw-typing-dot"></div></div></div>`;
    wrap.appendChild(el); wrap.scrollTop = wrap.scrollHeight;
  }

  function cwRemoveTyping() { const el = document.getElementById('cwTyping'); if (el) el.remove(); }

  async function cwSend() {
    const input = document.getElementById('cwInput');
    const text = input.value.trim();
    if (!text) return;
    if (cwChipsVisible) {
      document.getElementById('cwChips').style.display = 'none';
      cwChipsVisible = false;
    }
    input.value = '';
    document.getElementById('cwSendBtn').disabled = true;
    cwAppendMsg('user', text, 'Paciente');
    cwHistory.push({ role: 'user', content: text });
    cwShowTyping();
    try {
      const r = await fetch(`${RAILWAY_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: text, historial: cwHistory.slice(-10) })
      });
      const data = await r.json();
      cwRemoveTyping();
      const reply = data.respuesta || 'Lo siento, ocurrió un error.';
      cwAppendMsg('bot', reply, 'Asistente Tekio');
      cwHistory.push({ role: 'assistant', content: reply });
    } catch(e) {
      cwRemoveTyping();
      cwAppendMsg('bot', 'No pude conectarme. Intenta de nuevo.', 'Asistente Tekio');
    }
    document.getElementById('cwSendBtn').disabled = false;
    input.focus();
  }

  function sendChip(btn) { document.getElementById('cwInput').value = btn.textContent; cwSend(); }
  document.addEventListener('DOMContentLoaded', cwInit);
</script>
</body>
</html>
